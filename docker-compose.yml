services:
  server1:
    build: .
    ports:
      - "8001:8000"
    environment:
      - SERVER_ID=1
      - TARGET_HOST=server2
    networks:
      - wormhole_net
    labels:
      - "com.wormhole.hostname=testapp"
      - "com.wormhole.protocol=http"

  server2:
    build: .
    ports:
      - "8002:8000"
    environment:
      - SERVER_ID=2
      - TARGET_HOST=server1
    networks:
      - wormhole_net
    labels:
      - "com.wormhole.hostname=testapp"
      - "com.wormhole.protocol=http"

networks:
  wormhole_net:
    driver: bridge