services:
  server1:
    build: .
    ports:
      - "8001:8000"
    environment:
      - SERVER_ID=1
      - TARGET_HOST=server2
    networks:
      - wormhole-public
      - wormhole_net
    labels:
      - "com.wormhole.hostname=testapp3"
      - "com.wormhole.protocol=http"
      - "com.wormhole.port=8000"

  server2:
    build: .
    ports:
      - "8002:8000"
    environment:
      - SERVER_ID=2
      - TARGET_HOST=server1
    networks:
      - wormhole-public
      - wormhole_net
    labels:
      - "com.wormhole.hostname=testapp"
      - "com.wormhole.protocol=http"
      - "com.wormhole.port=8000"

networks:
  wormhole_net:
    driver: bridge
  wormhole-public:
    external: true
